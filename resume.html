<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume — Andrew Abu</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />

    <style>
      body {
        background-color: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .resume-page {
        flex: 1;
        padding: 70px 8% 90px;
        position: relative;
        z-index: 1;
        max-width: 1100px;
        margin: 0 auto;
        width: 100%;
      }

      .resume-header {
        text-align: center;
        margin-bottom: 50px;
      }

      .resume-header h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(2.4rem, 5vw, 3.8rem);
        font-weight: 800;
        letter-spacing: -0.05em;
        color: var(--text);
        margin-bottom: 14px;
      }

      .resume-header p {
        font-size: 0.95rem;
        color: var(--text-muted);
        margin-bottom: 28px;
      }

      .resume-actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .resume-frame-wrapper {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: 0 20px 80px rgba(0,0,0,0.5);
      }

      iframe {
        width: 100%;
        height: 85vh;
        min-height: 700px;
        display: block;
        border: none;
        background: white;
      }
    </style>
  </head>

  <body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <!-- ── NAVBAR ─────────────────────────────────────────── -->
    <nav>
      <div class="logo">ANDREW <span>ABU</span></div>
      <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul id="myLinks">
        <li><a href="index.html">About</a></li>
        <li><a href="proj.html">Projects</a></li>
        <li><a href="exp.html">Experience</a></li>
        <li><a href="resume.html" class="active">Resume</a></li>
        <li><a href="contact.html" class="nav-cta">Hire Me</a></li>
      </ul>
    </nav>
    <div class="nav-line"></div>

    <main class="resume-page reveal">

      <div class="resume-header">
        <div class="section-label">View &amp; Download</div>
        <h1>My <span class="red-text">Resume</span></h1>
        <p>A full breakdown of my experience, education, and skills.</p>
        <div class="resume-actions">
          <a href="files/detailedresume.pdf" class="btn btn-primary" download>
            <i class="fa-solid fa-download"></i>
            Download PDF
          </a>
          <a href="contact.html" class="btn btn-ghost">
            <i class="fa-solid fa-paper-plane"></i>
            Contact Me
          </a>
        </div>
      </div>

      <div class="resume-frame-wrapper">
        <iframe src="files/detailedresume.pdf" title="Andrew Abu Resume"></iframe>
      </div>

    </main>

    <!-- ── FOOTER ─────────────────────────────────────────── -->
    <footer>
      <div class="footer-inner">
        <div class="footer-brand">
          <span class="logo">ANDREW <span>ABU</span></span>
          <p>Building the web, one project at a time.</p>
        </div>
        <div class="footer-links">
          <a href="https://www.linkedin.com/in/andrew-abu-3bb797286/" class="footer-link" target="_blank" title="LinkedIn">
            <i class="fa-brands fa-linkedin"></i>
          </a>
          <a href="https://www.instagram.com/an_dyabu" class="footer-link" target="_blank" title="Instagram">
            <i class="fa-brands fa-instagram"></i>
          </a>
          <a href="mailto:andyabu@gmail.com" class="footer-link" title="Email">
            <i class="fa-solid fa-envelope"></i>
          </a>
        </div>
        <div class="footer-copy">
          <span>© 2025 Andrew Abu</span><br />
          <span style="font-size:0.7rem;opacity:0.55">All rights reserved</span>
        </div>
      </div>
    </footer>

    <script>
      const btn = document.getElementById('hamburgerBtn');
      const menu = document.getElementById('myLinks');
      btn.addEventListener('click', () => {
        menu.classList.toggle('show');
        btn.classList.toggle('open');
      });

      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.05 });
      document.querySelectorAll('.reveal').forEach(el => io.observe(el));
    </script>
  </body>
</html>
